name: "Run docker image scan with trivy"
description: "Run docker image scan with trivy"
inputs:
  IMAGE:
    required: true
  SEVERITY:
    required: false
    # default: "HIGH,CRITICAL" #TODO TO STICTLY ENFORCE SECURITY
    default: "CRITICAL"
  IGNORE_UNFIXED:
    required: false
    default: "true"    
  CREATE_SBOM:
    required: false
    default: "true"
  UPLOAD_SARIF:
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Scan pushed image for HIGH and CRITICAL vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      continue-on-error: true
      with:
        scan-type: image
        image-ref: ${{ inputs.IMAGE }}
        vuln-type: os,library
        severity: ${{ inputs.SEVERITY }}
        # ignore-unfixed: false #TODO TO STICTLY ENFORCE SECURITY
        ignore-unfixed: ${{ inputs.IGNORE_UNFIXED }}
        format: table
        output: trivy-report.txt
        exit-code: 911

    - name: Publish Trivy report to job summary
      shell: bash
      run: |
        {
          echo "## 🛡️ Vulnerability scan"
          echo ""
          echo "**Image:** \`${{ inputs.IMAGE }}\`"
          echo ""
          echo '```text'
          cat trivy-report.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Trivy SARIF to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
      if: ${{ inputs.UPLOAD_SARIF == 'true' }} 

    - name: Generate CycloneDX SBOM
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: image
        image-ref: ${{ env.PRIMARY_IMAGE }}
        format: cyclonedx
        output: sbom.cdx.json
      if: ${{ inputs.CREATE_SBOM == 'true' }} 

    - name: Upload SBOM as GitHub artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ github.event.repository.name }}-${{ github.sha }}
        path: sbom.cdx.json
      if: ${{ inputs.CREATE_SBOM == 'true' }}

    # - name: Fail if Trivy found vulnerabilities
    #   if: steps.trivy_sarif.outcome == 'failure'
    #   shell: bash
    #   run: exit 1