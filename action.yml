name: "Run docker image scan with trivy"
description: "Run docker image scan with trivy"
inputs:
  IMAGE:
    required: true
  SEVERITY:
    required: false
    default: "HIGH,CRITICAL"

runs:
  using: "composite"
  steps:
    - name: Scan pushed image for HIGH and CRITICAL vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: image
        image-ref: ${{ inputs.IMAGE }}
        vuln-type: os,library
        severity: ${{ inputs.SEVERITY }}
        ignore-unfixed: true
        exit-code: 1